services:
  n8n-postgres:
    image: postgres:16-alpine
    container_name: movie-tool-n8n-postgres
    environment:
      POSTGRES_USER: ${N8N_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
      POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: movie-tool-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.4.7
    container_name: movie-tool-ollama
    profiles:
      - ai-cpu
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.72.1
    container_name: movie-tool-n8n
    depends_on:
      - n8n-postgres
      - qdrant
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Shanghai}
      MOVIE_TOOL_API_URL: ${MOVIE_TOOL_API_URL:-http://movie-tool:8080}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      RAG_OPENAI_BASE_URL: ${RAG_OPENAI_BASE_URL:-http://host.docker.internal:8000/v1}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-Qwen3-Embedding-4B-4bit-DWQ}
      RAG_CHAT_MODEL: ${RAG_CHAT_MODEL:-Qwen3.5-4B-MLX-4bit}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/files:/files
    restart: unless-stopped

volumes:
  n8n_data:
  n8n_postgres_data:
  qdrant_data:
  ollama_data:
