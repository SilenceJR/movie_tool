<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Tool 控制台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --panel-soft: #eef4f2;
      --text: #17201d;
      --muted: #64716d;
      --line: #dce3e0;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --warn: #b45309;
      --bad: #b42318;
      --good: #027a48;
      --shadow: 0 10px 24px rgba(28, 43, 38, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 16px;
      background: #182522;
      color: #f5fbf8;
      border-right: 1px solid #0f1d1a;
    }

    .brand {
      padding: 0 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 720;
    }

    .brand p {
      margin: 0;
      color: rgba(245,251,248,0.72);
      font-size: 13px;
      line-height: 1.5;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 6px;
      color: rgba(245,251,248,0.78);
      font-size: 14px;
    }

    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.1);
      color: #ffffff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #5eead4;
      flex: 0 0 auto;
    }

    .content {
      min-width: 0;
      padding: 24px 28px 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .title h2 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn:hover { border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-strong); }

    .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      padding: 8px 12px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .metrics {
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      margin-bottom: 18px;
    }

    .metric, .panel, .feature {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 14px;
      min-height: 88px;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .sections {
      grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
      align-items: start;
    }

    .config-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      min-height: 48px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-header span {
      color: var(--muted);
      font-size: 13px;
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .feature {
      box-shadow: none;
      padding: 12px;
      min-height: 112px;
    }

    .feature-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .feature h4 {
      margin: 0;
      font-size: 14px;
    }

    .feature p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      background: #e6f4ef;
      color: var(--good);
      border: 1px solid #b7e4d1;
    }

    .badge.warn {
      background: #fff3df;
      color: var(--warn);
      border-color: #f5d399;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 620;
      background: #fbfcfc;
    }

    td code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .watch-run {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .watch-run:last-child { border-bottom: 0; }

    .watch-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      padding: 4px 0;
    }

    .empty {
      padding: 18px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .form {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .field input, .field select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }

    .field input:focus, .field select:focus {
      outline: 2px solid rgba(15, 118, 110, 0.18);
      border-color: var(--accent);
    }

    .check-field {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      color: var(--muted);
      font-size: 13px;
    }

    .check-field input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .list {
      display: grid;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .list-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfc;
      display: grid;
      gap: 6px;
    }

    .list-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      font-size: 13px;
      font-weight: 680;
    }

    .list-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .error {
      color: var(--bad);
    }

    @media (max-width: 1080px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .metrics { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
      .config-grid { grid-template-columns: 1fr; }
      .sections { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .content { padding: 18px 14px 28px; }
      .topbar { display: grid; }
      .actions { justify-content: stretch; }
      .btn { flex: 1 1 140px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .feature-list { grid-template-columns: 1fr; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Movie Tool</h1>
        <p>服务内置控制台</p>
      </div>
      <nav class="nav" aria-label="主导航">
        <a class="active" href="#overview"><span class="dot"></span>概览</a>
        <a href="#features"><span class="dot"></span>功能</a>
        <a href="#setup"><span class="dot"></span>配置</a>
        <a href="#scraper"><span class="dot"></span>刮削</a>
        <a href="#tasks"><span class="dot"></span>任务</a>
        <a href="#watch"><span class="dot"></span>监听</a>
        <a href="/api/dashboard" target="_blank"><span class="dot"></span>API</a>
        <a href="/api/health" target="_blank"><span class="dot"></span>健康</a>
      </nav>
    </aside>

    <main class="content">
      <section class="topbar" id="overview">
        <div class="title">
          <h2>当前实现进度</h2>
          <p>直接读取本服务 API，展示数据规模、已落地能力、近期任务和下载目录监听状态。</p>
        </div>
        <div class="actions">
          <button class="btn" type="button" id="refresh">刷新</button>
          <button class="btn primary" type="button" id="run-watch">运行监听</button>
          <button class="btn" type="button" id="retry-watch">重试近期失败</button>
        </div>
      </section>

      <div class="status-line">
        <span id="status">正在读取服务状态...</span>
        <span id="updated">--</span>
      </div>

      <section class="grid metrics" aria-label="关键指标">
        <div class="metric"><strong id="libraries">0</strong><span>媒体库</span></div>
        <div class="metric"><strong id="media">0</strong><span>媒体条目</span></div>
        <div class="metric"><strong id="files">0</strong><span>媒体文件</span></div>
        <div class="metric"><strong id="downloads">0</strong><span>下载目录</span></div>
        <div class="metric"><strong id="automations">0</strong><span>自动化</span></div>
        <div class="metric"><strong id="risks">0</strong><span>待处理风险</span></div>
      </section>

      <section class="grid config-grid" id="setup">
        <article class="panel">
          <div class="panel-header">
            <h3>本地 RAG</h3>
            <span id="rag-platform">--</span>
          </div>
          <div class="list" id="rag-list"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h3>媒体库配置</h3>
            <span id="library-count">0 个</span>
          </div>
          <form class="form" id="library-form">
            <div class="field">
              <label for="library-name">名称</label>
              <input id="library-name" name="name" autocomplete="off" placeholder="Movies">
            </div>
            <div class="field">
              <label for="library-path">媒体目录</label>
              <input id="library-path" name="path" autocomplete="off" placeholder="/media/movies">
            </div>
            <div class="field">
              <label for="library-type">类型</label>
              <select id="library-type" name="media_type">
                <option value="movie">电影</option>
                <option value="tv">电视剧</option>
                <option value="anime">动漫</option>
                <option value="av">AV</option>
              </select>
            </div>
            <label class="check-field">
              <input type="checkbox" name="watch_enabled" checked>
              <span>启用媒体库监听</span>
            </label>
            <button class="btn primary" type="submit">添加媒体库</button>
          </form>
          <div class="list" id="library-list"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h3>下载目录配置</h3>
            <span id="download-count">0 个</span>
          </div>
          <form class="form" id="download-form">
            <div class="field">
              <label for="download-name">名称</label>
              <input id="download-name" name="name" autocomplete="off" placeholder="Downloads">
            </div>
            <div class="field">
              <label for="download-path">下载目录</label>
              <input id="download-path" name="path" autocomplete="off" placeholder="/downloads/complete">
            </div>
            <div class="field">
              <label for="download-library">目标媒体库</label>
              <select id="download-library" name="library_id"></select>
            </div>
            <div class="field">
              <label for="download-mode">整理方式</label>
              <select id="download-mode" name="action_mode">
                <option value="hardlink">硬链</option>
                <option value="symlink">软链</option>
                <option value="move">移动</option>
                <option value="copy">复制</option>
              </select>
            </div>
            <label class="check-field">
              <input type="checkbox" name="watch_enabled" checked>
              <span>纳入下载目录监听</span>
            </label>
            <button class="btn primary" type="submit">添加下载目录</button>
          </form>
          <div class="list" id="download-list"></div>
        </article>

        <article class="panel" id="scraper">
          <div class="panel-header">
            <h3>AV 刮削验证</h3>
            <span>JavDB live</span>
          </div>
          <form class="form" id="scraper-form">
            <div class="field">
              <label for="scraper-number">番号或文件名</label>
              <input id="scraper-number" name="number" autocomplete="off" placeholder="SSNI-00123">
            </div>
            <div class="field">
              <label for="scraper-media-id">媒体 ID</label>
              <input id="scraper-media-id" name="media_id" autocomplete="off" placeholder="media_...">
            </div>
            <div class="field">
              <label for="scraper-file-id">媒体文件 ID</label>
              <input id="scraper-file-id" name="media_file_id" autocomplete="off" placeholder="file_...">
            </div>
            <div class="actions">
              <button class="btn" type="button" id="scraper-parse">解析</button>
              <button class="btn" type="button" id="scraper-load">加载候选</button>
              <button class="btn primary" type="submit">搜索候选</button>
            </div>
          </form>
          <div class="list" id="scraper-results"></div>
        </article>
      </section>

      <section class="grid sections">
        <div class="stack">
          <article class="panel" id="features">
            <div class="panel-header">
              <h3>已实现能力</h3>
              <span id="feature-count">0 项</span>
            </div>
            <div class="feature-list" id="feature-list"></div>
          </article>

          <article class="panel" id="tasks">
            <div class="panel-header">
              <h3>近期任务</h3>
              <span id="task-count">0 条</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>类型</th>
                    <th>状态</th>
                    <th>消息</th>
                    <th>更新时间</th>
                  </tr>
                </thead>
                <tbody id="task-rows"></tbody>
              </table>
            </div>
          </article>
        </div>

        <div class="stack">
          <article class="panel">
            <div class="panel-header">
              <h3>运行概况</h3>
              <span>实时汇总</span>
            </div>
            <div class="table-wrap">
              <table>
                <tbody id="summary-rows"></tbody>
              </table>
            </div>
          </article>

          <article class="panel" id="watch">
            <div class="panel-header">
              <h3>下载目录监听</h3>
              <span id="watch-count">0 批次</span>
            </div>
            <div id="watch-runs"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script>
    const els = {
      status: document.querySelector('#status'),
      updated: document.querySelector('#updated'),
      libraries: document.querySelector('#libraries'),
      media: document.querySelector('#media'),
      files: document.querySelector('#files'),
      downloads: document.querySelector('#downloads'),
      automations: document.querySelector('#automations'),
      risks: document.querySelector('#risks'),
      libraryCount: document.querySelector('#library-count'),
      libraryForm: document.querySelector('#library-form'),
      libraryList: document.querySelector('#library-list'),
      downloadCount: document.querySelector('#download-count'),
      downloadForm: document.querySelector('#download-form'),
      downloadLibrary: document.querySelector('#download-library'),
      downloadList: document.querySelector('#download-list'),
      ragPlatform: document.querySelector('#rag-platform'),
      ragList: document.querySelector('#rag-list'),
      featureCount: document.querySelector('#feature-count'),
      featureList: document.querySelector('#feature-list'),
      taskCount: document.querySelector('#task-count'),
      taskRows: document.querySelector('#task-rows'),
      summaryRows: document.querySelector('#summary-rows'),
      watchCount: document.querySelector('#watch-count'),
      watchRuns: document.querySelector('#watch-runs'),
      refresh: document.querySelector('#refresh'),
      runWatch: document.querySelector('#run-watch'),
      retryWatch: document.querySelector('#retry-watch')
    };
    els.scraperForm = document.querySelector('#scraper-form');
    els.scraperParse = document.querySelector('#scraper-parse');
    els.scraperLoad = document.querySelector('#scraper-load');
    els.scraperResults = document.querySelector('#scraper-results');

    let liveScraperCandidates = [];

    async function request(path, options) {
      const response = await fetch(path, options);
      if (!response.ok) {
        let message = response.status + ' ' + response.statusText;
        try {
          const body = await response.json();
          message = body.error?.message || message;
        } catch (_) {}
        throw new Error(message);
      }
      return response.json();
    }

    async function jsonRequest(path, payload) {
      return request(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }

    function setStatus(message, failed = false) {
      els.status.textContent = message;
      els.status.className = failed ? 'error' : '';
      els.updated.textContent = new Date().toLocaleString();
    }

    function statusBadge(status) {
      const lower = String(status || '').toLowerCase();
      const cls = lower.includes('failed') || lower.includes('失败') ? 'badge warn' : 'badge';
      return `<span class="${cls}">${escapeHtml(status || 'unknown')}</span>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function formatDate(value) {
      if (!value) return '--';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '--';
      return date.toLocaleString();
    }

    function render(data) {
      const c = data.counts || {};
      els.libraries.textContent = c.libraries || 0;
      els.media.textContent = c.media || 0;
      els.files.textContent = c.media_files || 0;
      els.downloads.textContent = `${c.watch_enabled_directories || 0}/${c.download_directories || 0}`;
      els.automations.textContent = `${c.enabled_automations || 0}/${c.automations || 0}`;
      els.risks.textContent = (c.failed_tasks || 0) + (c.failed_files || 0) + (c.missing_files || 0);

      const features = data.features || [];
      els.featureCount.textContent = `${features.length} 项`;
      els.featureList.innerHTML = features.map(item => `
        <section class="feature">
          <div class="feature-top">
            <h4>${escapeHtml(item.name)}</h4>
            ${statusBadge(item.status)}
          </div>
          <p>${escapeHtml(item.description)}</p>
        </section>
      `).join('') || '<div class="empty">暂无功能清单。</div>';

      const tasks = data.recent_tasks || [];
      els.taskCount.textContent = `${tasks.length} 条`;
      els.taskRows.innerHTML = tasks.map(item => `
        <tr>
          <td><code>${escapeHtml(item.type)}</code></td>
          <td>${statusBadge(item.status)}</td>
          <td>${escapeHtml(item.error || item.message || '--')}</td>
          <td>${formatDate(item.updated_at)}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" class="empty">暂无任务。</td></tr>';

      const rows = [
        ['运行中任务', c.running_tasks || 0],
        ['等待任务', c.pending_tasks || 0],
        ['失败任务', c.failed_tasks || 0],
        ['missing 文件', c.missing_files || 0],
        ['failed 文件', c.failed_files || 0],
        ['整理规则', c.organizer_rules || 0],
        ['刮削候选', c.scrape_candidates || 0]
      ];
      els.summaryRows.innerHTML = rows.map(([name, value]) => `
        <tr><th>${escapeHtml(name)}</th><td>${escapeHtml(value)}</td></tr>
      `).join('');

      const runs = data.recent_watch_runs || [];
      els.watchCount.textContent = `${runs.length} 批次`;
      els.watchRuns.innerHTML = runs.map(run => {
        const summary = run.summary || [];
        const lines = summary.map(item => `
          <div class="summary-row">
            <span>${escapeHtml(item.download_directory_name || item.path || item.download_directory_id)}</span>
            <span>${escapeHtml(item.status)} / 入库 ${escapeHtml(item.imported_count || 0)} / 失败 ${escapeHtml(item.failed_file_count || 0)}</span>
          </div>
        `).join('') || '<div class="summary-row"><span>无目录摘要</span><span>--</span></div>';
        return `
          <section class="watch-run">
            <div class="watch-title">
              <strong>${escapeHtml(run.task?.message || run.task?.id || 'watch run')}</strong>
              ${statusBadge(run.task?.status)}
            </div>
            ${lines}
          </section>
        `;
      }).join('') || '<div class="empty">暂无下载目录监听批次。</div>';
      renderRAG(data.rag || {});
    }

    function renderRAG(rag) {
      els.ragPlatform.textContent = rag.platform_hint || '--';
      const rows = [
        ['模型服务', rag.openai_base_url || '--'],
        ['Embedding', rag.embedding_model || '--'],
        ['Chat', rag.chat_model || '--'],
        ['Qdrant', rag.qdrant_url || '--'],
        ['Collection', rag.collection || '--'],
        ['API Key', rag.has_api_key ? '已配置' : '未配置']
      ];
      els.ragList.innerHTML = rows.map(([name, value]) => `
        <section class="list-item">
          <div class="list-title">
            <span>${escapeHtml(name)}</span>
          </div>
          <div class="list-meta">${escapeHtml(value)}</div>
        </section>
      `).join('');
    }

    function renderLibraries(items) {
      els.libraryCount.textContent = `${items.length} 个`;
      els.downloadLibrary.innerHTML = items.map(item => `
        <option value="${escapeHtml(item.id)}">${escapeHtml(item.name)} - ${escapeHtml(item.media_type)}</option>
      `).join('');
      els.downloadForm.querySelector('button[type="submit"]').disabled = items.length === 0;
      els.libraryList.innerHTML = items.map(item => `
        <section class="list-item">
          <div class="list-title">
            <span>${escapeHtml(item.name)}</span>
            ${statusBadge(item.media_type)}
          </div>
          <div class="list-meta">${escapeHtml(item.path)}</div>
          <div class="list-meta">NFO ${item.nfo_enabled ? '开启' : '关闭'} / STRM ${item.strm_enabled ? '开启' : '关闭'} / 监听 ${item.watch_enabled ? '开启' : '关闭'}</div>
        </section>
      `).join('') || '<div class="empty">还没有媒体库，先添加一个目标目录。</div>';
    }

    function renderDownloadDirectories(items, libraries) {
      const libraryNames = new Map(libraries.map(item => [item.id, item.name]));
      els.downloadCount.textContent = `${items.length} 个`;
      els.downloadList.innerHTML = items.map(item => `
        <section class="list-item">
          <div class="list-title">
            <span>${escapeHtml(item.name)}</span>
            ${statusBadge(item.watch_enabled && item.enabled ? '监听中' : '停用')}
          </div>
          <div class="list-meta">${escapeHtml(item.path)}</div>
          <div class="list-meta">目标：${escapeHtml(libraryNames.get(item.library_id) || item.library_id)} / ${escapeHtml(item.action_mode || 'hardlink')}</div>
        </section>
      `).join('') || '<div class="empty">还没有下载目录，可添加 BT/PT 完成目录。</div>';
    }

    function renderScraperParse(parsed) {
      liveScraperCandidates = [];
      els.scraperResults.innerHTML = `
        <section class="list-item">
          <div class="list-title">
            <span>${escapeHtml(parsed.normalized || parsed.raw || '--')}</span>
            ${statusBadge(parsed.kind || 'parsed')}
          </div>
          <div class="list-meta">前缀：${escapeHtml(parsed.prefix || '--')} / 数字：${escapeHtml(parsed.digits || '--')}</div>
          <div class="list-meta">推荐源：${escapeHtml((parsed.preferred_providers || []).join('、') || '--')}</div>
        </section>
      `;
    }

    function renderScraperCandidates(candidates) {
      liveScraperCandidates = candidates || [];
      els.scraperResults.innerHTML = liveScraperCandidates.map((item, index) => `
        <section class="list-item">
          <div class="list-title">
            <span>${escapeHtml(item.title || item.external_id || '--')}</span>
            ${statusBadge(`${item.provider || 'source'} ${item.score || 0}`)}
          </div>
          <div class="list-meta">${escapeHtml(item.external_id || '--')} / ${escapeHtml(item.year || '--')}</div>
          <div class="list-meta">${escapeHtml(item.overview || item.original_title || '--')}</div>
          <button class="btn primary scraper-save" type="button" data-index="${index}">保存为候选</button>
        </section>
      `).join('') || '<div class="empty">没有搜索到候选。</div>';
    }

    function renderSavedScraperCandidates(candidates) {
      liveScraperCandidates = [];
      els.scraperResults.innerHTML = (candidates || []).map(item => `
        <section class="list-item">
          <div class="list-title">
            <span>${escapeHtml(item.title || item.external_id || '--')}</span>
            ${statusBadge(`${item.provider || 'source'} ${item.score || 0}`)}
          </div>
          <div class="list-meta">${escapeHtml(item.external_id || '--')} / ${escapeHtml(item.year || '--')}</div>
          <div class="list-meta">媒体：${escapeHtml(item.media_id || '--')} / 文件：${escapeHtml(item.media_file_id || '--')}</div>
          <div class="list-meta">${escapeHtml((item.score_reasons || []).join('、') || item.overview || '--')}</div>
          <button class="btn primary scraper-select" type="button" data-id="${escapeHtml(item.id)}" data-media-id="${escapeHtml(item.media_id || '')}">选择并锁定</button>
        </section>
      `).join('') || '<div class="empty">没有已保存候选。</div>';
    }

    function scraperIDs() {
      const form = new FormData(els.scraperForm);
      return {
        media_id: String(form.get('media_id') || '').trim(),
        media_file_id: String(form.get('media_file_id') || '').trim()
      };
    }

    async function load() {
      try {
        setStatus('正在读取服务状态...');
        const [data, libraries, downloads] = await Promise.all([
          request('/api/dashboard'),
          request('/api/libraries'),
          request('/api/download-directories')
        ]);
        render(data);
        renderLibraries(libraries);
        renderDownloadDirectories(downloads, libraries);
        setStatus('已连接服务，已同步 dashboard、媒体库和下载目录配置。');
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function postAndRefresh(path, label) {
      try {
        setStatus(`${label}中...`);
        await request(path, { method: 'POST' });
        await load();
        setStatus(`${label}完成。`);
      } catch (error) {
        setStatus(`${label}失败：${error.message}`, true);
      }
    }

    els.refresh.addEventListener('click', load);
    els.runWatch.addEventListener('click', () => postAndRefresh('/api/download-directories/watch/run', '运行监听'));
    els.retryWatch.addEventListener('click', () => postAndRefresh('/api/download-directories/watch/retry-failed', '重试近期失败'));
    els.scraperParse.addEventListener('click', async () => {
      const form = new FormData(els.scraperForm);
      const number = String(form.get('number') || '').trim();
      if (!number) {
        setStatus('解析失败：番号或文件名必填。', true);
        return;
      }
      try {
        setStatus('正在解析 AV 番号...');
        const result = await request(`/api/scrapers/av/parse?number=${encodeURIComponent(number)}`);
        renderScraperParse(result.parsed || {});
        setStatus('AV 番号解析完成。');
      } catch (error) {
        setStatus(`解析失败：${error.message}`, true);
      }
    });
    els.scraperLoad.addEventListener('click', async () => {
      const ids = scraperIDs();
      if (!ids.media_id && !ids.media_file_id) {
        setStatus('加载候选失败：请先填写媒体 ID 或媒体文件 ID。', true);
        return;
      }
      const query = ids.media_id
        ? `media_id=${encodeURIComponent(ids.media_id)}`
        : `media_file_id=${encodeURIComponent(ids.media_file_id)}`;
      try {
        setStatus('正在加载已保存候选...');
        const candidates = await request(`/api/scrape-candidates?${query}`);
        renderSavedScraperCandidates(candidates);
        setStatus(`已加载 ${candidates.length || 0} 个候选。`);
      } catch (error) {
        setStatus(`加载候选失败：${error.message}`, true);
      }
    });
    els.scraperForm.addEventListener('submit', async event => {
      event.preventDefault();
      const form = new FormData(els.scraperForm);
      const number = String(form.get('number') || '').trim();
      if (!number) {
        setStatus('搜索失败：番号或文件名必填。', true);
        return;
      }
      try {
        setStatus('正在搜索 JavDB 候选...');
        const result = await request(`/api/scrapers/av/search?number=${encodeURIComponent(number)}&source=javdb`);
        renderScraperCandidates(result.candidates || []);
        setStatus(`JavDB 搜索完成，候选 ${result.count || 0} 个。`);
      } catch (error) {
        setStatus(`搜索失败：${error.message}`, true);
      }
    });
    els.scraperResults.addEventListener('click', async event => {
      const saveButton = event.target.closest('.scraper-save');
      const selectButton = event.target.closest('.scraper-select');
      if (!saveButton && !selectButton) return;
      if (selectButton) {
        const candidateID = selectButton.dataset.id;
        const mediaID = selectButton.dataset.mediaId || scraperIDs().media_id;
        if (!candidateID || !mediaID) {
          setStatus('选择候选失败：候选 ID 和媒体 ID 必填。', true);
          return;
        }
        try {
          setStatus('正在选择候选...');
          await jsonRequest('/api/scrape-decisions', {
            media_id: mediaID,
            candidate_id: candidateID,
            decision_source: 'user',
            decision: 'select',
            confidence: 100,
            reason: '控制台确认',
            locked: true
          });
          await load();
          setStatus('候选已选择并锁定。');
        } catch (error) {
          setStatus(`选择候选失败：${error.message}`, true);
        }
        return;
      }
      const candidate = liveScraperCandidates[Number(saveButton.dataset.index)];
      const ids = scraperIDs();
      if (!candidate) {
        setStatus('保存失败：候选不存在。', true);
        return;
      }
      if (!ids.media_id && !ids.media_file_id) {
        setStatus('保存失败：请先填写媒体 ID 或媒体文件 ID。', true);
        return;
      }
      try {
        setStatus('正在保存候选...');
        await jsonRequest('/api/scrapers/av/candidates', {
          ...ids,
          source: candidate.provider || 'javdb',
          candidate
        });
        await load();
        setStatus('候选已保存到 scrape_candidates。');
      } catch (error) {
        setStatus(`保存候选失败：${error.message}`, true);
      }
    });
    els.libraryForm.addEventListener('submit', async event => {
      event.preventDefault();
      const form = new FormData(els.libraryForm);
      const name = String(form.get('name') || '').trim();
      const path = String(form.get('path') || '').trim();
      if (!name || !path) {
        setStatus('添加媒体库失败：名称和目录必填。', true);
        return;
      }
      try {
        setStatus('正在添加媒体库...');
        await jsonRequest('/api/libraries', {
          name,
          path,
          media_type: form.get('media_type'),
          watch_enabled: form.get('watch_enabled') === 'on'
        });
        els.libraryForm.reset();
        els.libraryForm.elements.watch_enabled.checked = true;
        await load();
        setStatus('媒体库已添加。');
      } catch (error) {
        setStatus(`添加媒体库失败：${error.message}`, true);
      }
    });
    els.downloadForm.addEventListener('submit', async event => {
      event.preventDefault();
      const form = new FormData(els.downloadForm);
      const name = String(form.get('name') || '').trim();
      const path = String(form.get('path') || '').trim();
      const libraryID = String(form.get('library_id') || '').trim();
      if (!name || !path || !libraryID) {
        setStatus('添加下载目录失败：名称、目录和目标媒体库必填。', true);
        return;
      }
      try {
        setStatus('正在添加下载目录...');
        await jsonRequest('/api/download-directories', {
          name,
          path,
          library_id: libraryID,
          action_mode: form.get('action_mode'),
          enabled: true,
          watch_enabled: form.get('watch_enabled') === 'on'
        });
        els.downloadForm.reset();
        els.downloadForm.elements.watch_enabled.checked = true;
        await load();
        setStatus('下载目录已添加。');
      } catch (error) {
        setStatus(`添加下载目录失败：${error.message}`, true);
      }
    });
    window.addEventListener('focus', load);
    load();
  </script>
</body>
</html>
